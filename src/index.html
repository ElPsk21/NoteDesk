<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <!-- Content Security Policy: strictly secure for local app -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: file:;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoteDesk - Notas Personales</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Google Fonts: Inter (UI) and JetBrains Mono (Code blocks) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Fira+Code:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <!-- Left Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="vault-info">
          <svg class="icon-vault" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
          </svg>
          <span class="vault-title" id="vault-title">NoteDesk</span>
        </div>
      </div>
      
      <!-- Toolbar for Quick Actions -->
      <div class="sidebar-toolbar">
        <button id="btn-new-file" title="Nueva Nota" class="btn-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="12" y1="18" x2="12" y2="12"></line>
            <line x1="9" y1="15" x2="15" y2="15"></line>
          </svg>
        </button>
        <button id="btn-new-folder" title="Nueva Carpeta" class="btn-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
            <line x1="12" y1="11" x2="12" y2="17"></line>
            <line x1="9" y1="14" x2="15" y2="14"></line>
          </svg>
        </button>
        <button id="btn-refresh" title="Sincronizar Vault" class="btn-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
        </button>
      </div>

      <!-- Note Search Bar -->
      <div class="sidebar-search">
        <div class="search-input-wrapper">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" id="search-input" placeholder="Buscar notas...">
        </div>
      </div>

      <!-- File Explorer Tree -->
      <div class="file-explorer" id="file-explorer">
        <!-- Tree items will be dynamically generated here -->
      </div>
    </aside>

    <!-- Main Workspace -->
    <main class="workspace">
      <!-- Welcome Pane (Shown when no note is open) -->
      <section class="welcome-pane" id="welcome-pane">
        <div class="welcome-content">
          <div class="welcome-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
              <line x1="16" y1="13" x2="8" y2="13"></line>
              <line x1="16" y1="17" x2="8" y2="17"></line>
              <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
          </div>
          <h2>Bienvenido a NoteDesk</h2>
          <p>Tu bóveda personal de notas en Markdown.</p>
          <div class="welcome-actions">
            <button id="btn-welcome-new-file" class="btn-primary">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="btn-svg-icon">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
              Crear Nueva Nota
            </button>
            <div class="shortcuts-guide">
              <h3>Accesos Rápidos</h3>
              <div class="shortcut-row">
                <span class="shortcut-desc">Nueva Nota</span>
                <kbd class="shortcut-key">Ctrl + N</kbd>
              </div>
              <div class="shortcut-row">
                <span class="shortcut-desc">Guardar Nota</span>
                <kbd class="shortcut-key">Ctrl + S</kbd>
              </div>
              <div class="shortcut-row">
                <span class="shortcut-desc">Vista Dividida</span>
                <kbd class="shortcut-key">Ctrl + Alt + P</kbd>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Note Editor/Preview Pane (Shown when a note is active) -->
      <section class="editor-pane hidden" id="editor-pane">
        <!-- Main Panel Header -->
        <header class="editor-header">
          <div class="current-note-info">
            <svg class="note-type-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
            </svg>
            <span class="note-title-display" id="note-title-display" title="Haz doble click para renombrar">nota.md</span>
            <input type="text" id="note-title-input" class="note-title-input hidden">
            <span class="save-status" id="save-status">Guardado</span>
          </div>

          <div class="pane-controls">
            <!-- View Mode Switcher -->
            <div class="mode-switcher">
              <button id="btn-mode-edit" class="btn-mode active" title="Editar (Markdown)">Editar</button>
              <button id="btn-mode-split" class="btn-mode" title="Vista Dividida (Ctrl+Alt+P)">Dividido</button>
              <button id="btn-mode-preview" class="btn-mode" title="Vista Previa (HTML)">Previa</button>
            </div>
          </div>
        </header>

        <!-- Pane Content Area (Splitable) -->
        <div class="pane-content mode-edit" id="pane-content">
          <!-- Text Editor Area -->
          <div class="editor-container" id="editor-container">
            <div id="codemirror-host"></div>
          </div>

          <!-- Divider (Only visible in Split mode) -->
          <div class="split-divider" id="split-divider"></div>

          <!-- Markdown Render Preview Area -->
          <div class="preview-container" id="preview-container">
            <div class="markdown-body" id="markdown-preview">
              <!-- Rendered Markdown HTML goes here -->
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Bottom Status Bar -->
  <footer class="status-bar">
    <div class="status-left">
      <span class="status-item" id="status-vault-path">Bóveda: cargando...</span>
    </div>
    <div class="status-right">
      <span class="status-item hidden" id="status-word-count">0 palabras</span>
      <span class="status-item hidden" id="status-char-count">0 caracteres</span>
      <span class="status-item font-mono">UTF-8</span>
    </div>
  </footer>

  <!-- Modal for Renaming or Prompting (Fallback for prompt/confirm dialogs) -->
  <div class="modal-overlay hidden" id="modal-container">
    <div class="modal">
      <h3 id="modal-title">Renombrar elemento</h3>
      <div class="modal-body">
        <input type="text" id="modal-input" class="modal-input" placeholder="Nombre...">
        <p class="modal-error hidden" id="modal-error"></p>
      </div>
      <div class="modal-footer">
        <button id="btn-modal-cancel" class="btn-secondary">Cancelar</button>
        <button id="btn-modal-confirm" class="btn-primary">Confirmar</button>
      </div>
    </div>
  </div>

  <script src="renderer.bundle.js"></script>
</body>
</html>
